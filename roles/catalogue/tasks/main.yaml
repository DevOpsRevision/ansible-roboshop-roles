- name: app-setup
  include_role:
    name: common
    tasks_from: app-setup

- name: nodejs setup
  include_role:
    name: common
    tasks_from: nodejs

- name: Copy mongod repo
  ansible.builtin.copy:
    src: mongo.repo
    dest: /etc/yum.repos.d/mongo.repo

- name: Install mongodb client
  ansible.builtin.dnf:
    name: mongodb-mongosh
    state: present

- name: Check products are loaded or not
  ansible.builtin.command: mongosh --host mongodb.easydevops.fun --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
  register: catalogue_output

- name: Print catalogue_output
  ansible.builtin.debug:
    msg: "{{ catalogue_output }}"

- name: Load products
  ansible.builtin.shell: mongosh --host mongodb.easydevops.fun < /app/db/master-data.js
  when: catalogue_output.stdout | int < 0

- name: systemd setup
  include_role: 
    name: common
    tasks_from: systemd

- name: Deployment
  tag: 
  - deployment
  import_role:
    name: common
    tasks_from: deployment