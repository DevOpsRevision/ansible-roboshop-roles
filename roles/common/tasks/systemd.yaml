- name: Copy Catalogue systemd service file
  ansible.builtin.template:
    src: catalogue.service.j2
    dest: /etc/systemd/system/catalogue.service

- name: systemctl deamon-reload
  ansible.builtin.systemd_service:
    daemon_reload: true

- name: Start & Enable catalogue server
  ansible.builtin.service:
    name: catalogue
    state: restarted #Even app is not running, we can still directly re-start.
    enabled: yes
