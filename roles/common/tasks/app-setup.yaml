- name: Create Roboshop System User
  ansible.builtin.user:
    name: roboshop
    shell: /sbin/nologin
    system: true
    home: /app

- name: Create Application directory
  ansible.builtin.file:
    path: /app
    state: directory

- name: Download catalogue Application
  ansible.builtin.get_url:
    url: "https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip"
    dest: /tmp/catalogue.zip

#This moduel thinks file exist on  anisble control server and it needs to extract on remote machine
- name: Unzip Application
  ansible.builtin.unarchive:
    src: /tmp/catalogue.zip
    dest: /app
    remote_src: yes #This means file already exists in this particular server.
